name: Lint

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  formatting:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Julia
        run: |
          curl -fsSL https://install.julialang.org | sh -s -- --yes --default-channel=1.11
          echo "$HOME/.juliaup/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v5
        with:
          path: |
            ~/.julia/artifacts
            ~/.julia/compiled
            ~/.julia/packages
            ~/.julia/scratchspaces
            ~/.julia/registries
          key: ${{ runner.os }}-julia-lint-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-julia-lint-
            ${{ runner.os }}-julia-

      - name: Check formatting
        run: |
          using Pkg
          ENV["JULIA_PKG_SERVER"] = ""
          Pkg.activate(temp = true)
          Pkg.add("JuliaFormatter")
          using JuliaFormatter
          format(".")
        shell: julia --color=yes {0}

      - name: Fail on formatting drift
        run: git diff --exit-code

  links:
    name: Link checker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: >
            --verbose
            --no-progress
            --exclude '/Users/mikhailmikhasenko/Documents/JuliaDev.CAT/PhaseSpaceRembo/'
            --exclude 'https://mmikhasenko.github.io/RamboOnDiet.jl/'
            './**/*.md'
