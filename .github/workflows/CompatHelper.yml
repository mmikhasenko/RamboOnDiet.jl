name: CompatHelper

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  compathelper:
    runs-on: ubuntu-latest
    steps:
      - name: Install Julia
        run: |
          curl -fsSL https://install.julialang.org | sh -s -- --yes --default-channel=1
          echo "$HOME/.juliaup/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v5
        with:
          path: |
            ~/.julia/artifacts
            ~/.julia/compiled
            ~/.julia/packages
            ~/.julia/scratchspaces
            ~/.julia/registries
          key: ${{ runner.os }}-julia-compathelper-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-julia-compathelper-
            ${{ runner.os }}-julia-

      - name: Add the General registry via Git
        run: |
          import Pkg
          ENV["JULIA_PKG_SERVER"] = ""
          Pkg.Registry.add("General")
        shell: julia --color=yes {0}

      - name: Install CompatHelper
        run: |
          import Pkg
          Pkg.add(name = "CompatHelper", uuid = "aa819f21-2bde-4658-8897-bab36330d9b7", version = "3")
        shell: julia --color=yes {0}

      - name: Run CompatHelper
        run: |
          import CompatHelper
          CompatHelper.main()
        shell: julia --color=yes {0}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMPATHELPER_PRIV: ${{ secrets.DOCUMENTER_KEY }}
