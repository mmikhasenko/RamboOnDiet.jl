name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Julia
        run: |
          curl -fsSL https://install.julialang.org | sh -s -- --yes --default-channel=1.11
          echo "$HOME/.juliaup/bin" >> "$GITHUB_PATH"

      - name: Drop local manifests for CI resolution
        run: rm -f Manifest.toml docs/Manifest.toml

      - uses: actions/cache@v5
        with:
          path: |
            ~/.julia/artifacts
            ~/.julia/compiled
            ~/.julia/packages
            ~/.julia/scratchspaces
            ~/.julia/registries
          key: ${{ runner.os }}-julia-${{ hashFiles('**/Project.toml', '**/Manifest.toml') }}
          restore-keys: |
            ${{ runner.os }}-julia-

      - name: Build package
        run: julia --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.build()'

      - name: Run tests
        run: julia --project=. -e 'using Pkg; Pkg.test()'
