name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5

      - name: Clone local path dependencies
        run: |
          git clone --depth 1 https://github.com/mmikhasenko/FourVectors.jl ../FourVectors.jl
          git clone --depth 1 https://github.com/JuliaHEP/LorentzVectorBase.jl ../../LorentzVectorBase.jl

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.11'

      - uses: actions/cache@v5
        with:
          path: |
            ~/.julia/artifacts
            ~/.julia/compiled
            ~/.julia/packages
            ~/.julia/scratchspaces
            ~/.julia/registries
          key: ${{ runner.os }}-julia-${{ hashFiles('**/Project.toml', '**/Manifest.toml') }}
          restore-keys: |
            ${{ runner.os }}-julia-

      - uses: julia-actions/julia-buildpkg@v1

      - uses: julia-actions/julia-runtest@v1
