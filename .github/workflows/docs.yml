name: Docs

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: write
  contents: write
  pull-requests: read
  statuses: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5

      - name: Clone local path dependencies
        run: |
          git clone --depth 1 https://github.com/mmikhasenko/FourVectors.jl ../FourVectors.jl
          git clone --depth 1 https://github.com/JuliaHEP/LorentzVectorBase.jl ../../LorentzVectorBase.jl

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.11'

      - uses: actions/cache@v5
        with:
          path: |
            ~/.julia/artifacts
            ~/.julia/compiled
            ~/.julia/packages
            ~/.julia/scratchspaces
            ~/.julia/registries
          key: ${{ runner.os }}-julia-docs-${{ hashFiles('**/Project.toml', '**/Manifest.toml') }}
          restore-keys: |
            ${{ runner.os }}-julia-docs-
            ${{ runner.os }}-julia-

      - name: Build docs
        run: julia --project=docs docs/make.jl
