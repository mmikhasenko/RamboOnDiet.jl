name: Docs

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: write
  contents: write
  pull-requests: read
  statuses: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Clone local path dependencies
        run: |
          git clone --depth 1 https://github.com/mmikhasenko/FourVectors.jl ../FourVectors.jl
          git clone --depth 1 https://github.com/JuliaHEP/LorentzVectorBase.jl ../../LorentzVectorBase.jl

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.11'

      - uses: julia-actions/cache@v2

      - name: Build docs
        run: julia --project=docs docs/make.jl
